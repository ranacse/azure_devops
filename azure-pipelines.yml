trigger:
- main

pool:
  name: 'Default'

stages:
- stage: BuildAndDeploy
  displayName: 'Build and Deploy Stage'
  jobs:
  - job: DeployJob
    displayName: 'Deploy to My Server'
    steps:
    - checkout: self
      displayName: 'Pull Code from GitHub'

    - script: |
        echo "Starting deployment process..."
        # ফাইলটি সার্ভারের ওয়েব ডিরেক্টরিতে কপি করা হচ্ছে
        sudo cp $(Build.SourcesDirectory)/index.html /var/www/html/
        # ফাইলের পারমিশন ঠিক করা হচ্ছে যেন সবাই ব্রাউজারে দেখতে পারে
        sudo chmod 644 /var/www/html/index.html
      displayName: 'Copy index.html to Apache Web Server'